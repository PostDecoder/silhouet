<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ma progression · Silhouet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e0c;--panel:#111714;--panel-2:#161e1a;--line:rgba(255,255,255,.07);--txt:#eef2ef;--muted:#8a968f;--lime:#c4ff4d;--lime-dim:#7a9e2e;--amber:#ffb24d;--red:#ff6b5e;--teal:#3dd7b0;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--txt);font-family:'Archivo',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.45;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(900px 500px at 80% -10%,rgba(196,255,77,.10),transparent 60%),radial-gradient(700px 600px at -10% 30%,rgba(61,215,176,.07),transparent 55%);}
  .wrap{max-width:480px;margin:0 auto;padding:0 18px 60px;}
  header{padding:34px 0 14px;display:flex;align-items:center;justify-content:space-between;}
  .coach-badge{display:flex;align-items:center;gap:10px;}
  .coach-logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--lime),var(--teal));display:grid;place-items:center;font-family:'Bricolage Grotesque';font-weight:800;color:#0a0e0c;font-size:18px;}
  .coach-meta small{display:block;color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase;}
  .coach-meta b{font-family:'Bricolage Grotesque';font-weight:700;font-size:14px;}
  .live{font-size:10px;color:var(--lime);letter-spacing:.16em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px var(--lime);animation:pulse 2s infinite;}
  @keyframes pulse{50%{opacity:.35}}
  .hero{margin-top:10px;}
  .hero .eyebrow{color:var(--lime-dim);font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;}
  .hero h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:42px;line-height:.98;letter-spacing:-.02em;margin-top:6px;}
  .hero .sub{color:var(--muted);font-size:13.5px;margin-top:10px;}
  .hero .sub b{color:var(--teal);font-weight:600;}
  .scorecard{margin-top:22px;background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:22px;padding:22px;display:flex;align-items:center;gap:20px;position:relative;overflow:hidden;}
  .scorecard::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(196,255,77,.18),transparent 70%);}
  .ring{position:relative;width:96px;height:96px;flex-shrink:0;}
  .ring svg{transform:rotate(-90deg)}
  .ring .val{position:absolute;inset:0;display:grid;place-content:center;text-align:center;}
  .ring .val b{font-family:'Bricolage Grotesque';font-weight:800;font-size:30px;line-height:1;}
  .ring .val span{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}
  .score-txt h3{font-family:'Bricolage Grotesque';font-weight:700;font-size:17px;}
  .score-txt p{color:var(--muted);font-size:12.5px;margin-top:4px;}
  .delta{display:inline-flex;align-items:center;gap:5px;margin-top:9px;background:rgba(196,255,77,.12);color:var(--lime);font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;}
  .sec-h{display:flex;align-items:baseline;justify-content:space-between;margin:30px 2px 14px;}
  .sec-h h2{font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;}
  .sec-h span{font-size:11px;color:var(--muted);}
  .metrics{display:flex;flex-direction:column;gap:14px;}
  .metric{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:18px;padding:15px 17px;}
  .metric .top{display:flex;align-items:center;justify-content:space-between;}
  .metric .top h4{font-size:13.5px;font-weight:600;}
  .metric .top .now{font-family:'Bricolage Grotesque';font-weight:800;font-size:17px;}
  .metric .top .now em{color:var(--muted);font-size:11px;font-style:normal;font-weight:400;}
  .track{margin-top:11px;height:8px;background:rgba(255,255,255,.05);border-radius:8px;position:relative;overflow:hidden;}
  .fill{position:absolute;inset:0 auto 0 0;border-radius:8px;background:linear-gradient(90deg,var(--lime-dim),var(--lime));width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1);}
  .metric .foot{display:flex;justify-content:space-between;margin-top:8px;font-size:10.5px;color:var(--muted);}
  .metric .foot b{color:var(--teal);}
  .timeline{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:18px;padding:16px 18px;}
  .tl-row{display:flex;gap:13px;padding:11px 0;border-bottom:1px solid var(--line);}
  .tl-row:last-child{border-bottom:none}
  .tl-dot{width:9px;height:9px;border-radius:50%;background:var(--lime);margin-top:6px;flex-shrink:0;box-shadow:0 0 0 4px rgba(196,255,77,.1);}
  .tl-row.old .tl-dot{background:var(--muted);box-shadow:none;}
  .tl-row .c b{font-size:13px;font-weight:600;}
  .tl-row .c small{display:block;color:var(--muted);font-size:11px;margin-top:2px;}
  .tl-row .date{margin-left:auto;color:var(--muted);font-size:11px;white-space:nowrap;}
  .note{background:rgba(61,215,176,.06);border:1px solid rgba(61,215,176,.2);border-radius:16px;padding:15px 17px;margin-top:20px;}
  .note small{color:var(--teal);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;}
  .note p{font-size:13.5px;margin-top:6px;color:#d6efe6;font-style:italic;}
  footer{text-align:center;margin-top:34px;color:var(--muted);font-size:11px;}
  footer b{color:var(--txt);font-weight:600;}
  .state{text-align:center;padding:80px 20px;color:var(--muted);}
  .state .big{font-size:40px;margin-bottom:14px;}
</style>
</head>
<body>
<div class="wrap">
  <div id="state" class="state">Chargement…</div>
  <div id="content" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL="https://gepplcndfbjohplfdxki.supabase.co";
  const SUPABASE_KEY="sb_publishable_FVByYoFLUxfiHTZpAtf5dQ_2k56Hf-7";
  const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  function esc(s){return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

  (async()=>{
    const token=new URLSearchParams(location.search).get('c');
    const state=document.getElementById('state');
    if(!token){ state.innerHTML='<div class="big">🔗</div>Lien invalide.'; return; }

    const {data:clients}=await sb.from('clients').select('*').eq('lien_token',token).limit(1);
    if(!clients||!clients.length){ state.innerHTML='<div class="big">🔍</div>Aucune fiche trouvée pour ce lien.'; return; }
    const client=clients[0];

    const {data:evals}=await sb.from('evaluations').select('*').eq('client_id',client.id).order('created_at',{ascending:true});
    if(!evals||!evals.length){
      state.innerHTML=`<div class="big">⏳</div>La fiche de ${esc(client.nom)} sera bientôt prête.<br>Ton coach n'a pas encore enregistré de séance.`;
      return;
    }

    const latest=evals[evals.length-1];
    const first=evals[0];
    const crit=latest.criteres||{};
    const critFirst=first.criteres||{};

    const vals=Object.values(crit);
    const globalNow=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10);
    const firstVals=Object.values(critFirst);
    const globalFirst=firstVals.length?Math.round(firstVals.reduce((a,b)=>a+b,0)/firstVals.length*10):globalNow;
    const deltaPts=globalNow-globalFirst;

    const metricsHtml=Object.entries(crit).map(([name,val])=>{
      const was=critFirst[name];
      const pct=val*10;
      const wasTxt=(was!==undefined)?`· était ${was}`:'';
      const prog=(was!==undefined&&was>0)?Math.round((val-was)/was*100):null;
      const progTxt=(prog!==null&&prog>0)?`+${prog}% de progression`:(prog!==null&&prog<0?`${prog}%`:'point de départ');
      return `<div class="metric">
        <div class="top"><h4>${esc(name)}</h4><div class="now">${val}/10 <em>${wasTxt}</em></div></div>
        <div class="track"><div class="fill" data-w="${pct}%"></div></div>
        <div class="foot"><span>Début</span><b>${progTxt}</b></div>
      </div>`;
    }).join('');

    const tlHtml=evals.slice().reverse().slice(0,5).map((e,i)=>{
      const d=new Date(e.created_at);
      const label=i===0?'Dernière séance':d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
      const note=e.note_seance?esc(e.note_seance):'Séance enregistrée';
      return `<div class="tl-row ${i>1?'old':''}"><div class="tl-dot"></div>
        <div class="c"><b>Séance</b><small>${note}</small></div>
        <div class="date">${label}</div></div>`;
    }).join('');

    const coachNote=latest.note_seance?`<div class="note"><small>Mot de ton coach</small><p>"${esc(latest.note_seance)}"</p></div>`:'';
    const weeks=Math.max(1,Math.round((new Date(latest.created_at)-new Date(first.created_at))/(7*864e5)));

    document.getElementById('content').innerHTML=`
      <header>
        <div class="coach-badge">
          <div class="coach-logo">S</div>
          <div class="coach-meta"><small>Ton suivi</small><b>Silhouet</b></div>
        </div>
        <div class="live"><span class="dot"></span>Suivi actif</div>
      </header>
      <section class="hero">
        <div class="eyebrow">Bilan personnel</div>
        <h1>${esc(client.nom)}</h1>
        <p class="sub">${evals.length} séance${evals.length>1?'s':''} · ${weeks} semaine${weeks>1?'s':''} de suivi</p>
      </section>
      <div class="scorecard">
        <div class="ring"><svg width="96" height="96">
          <circle cx="48" cy="48" r="42" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="8"/>
          <circle id="ringFill" cx="48" cy="48" r="42" fill="none" stroke="var(--lime)" stroke-width="8" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="264"/>
        </svg><div class="val"><b>${globalNow}</b><span>/ 100</span></div></div>
        <div class="score-txt"><h3>Forme générale</h3><p>Sur ${Object.keys(crit).length} critères suivis.</p>
        ${deltaPts>0?`<span class="delta">▲ +${deltaPts} pts depuis le début</span>`:''}</div>
      </div>
      <div class="sec-h"><h2>Ta progression</h2><span>vs. départ</span></div>
      <div class="metrics">${metricsHtml}</div>
      <div class="sec-h"><h2>Historique</h2><span>${evals.length} séances</span></div>
      <div class="timeline">${tlHtml}</div>
      ${coachNote}
      <footer>Suivi propulsé par <b>Silhouet</b><br>Mis à jour après chaque séance.</footer>`;

    state.style.display='none';
    document.getElementById('content').style.display='block';

    setTimeout(()=>{
      const r=document.getElementById('ringFill');
      if(r){ r.style.transition='stroke-dashoffset 1.3s cubic-bezier(.2,.8,.2,1)'; r.style.strokeDashoffset=264-(264*globalNow/100); }
      document.querySelectorAll('.fill').forEach((f,i)=>setTimeout(()=>f.style.width=f.dataset.w,150+i*120));
    },250);
  })();
</script>
</body>
</html>
