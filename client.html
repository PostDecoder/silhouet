<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Silhouet · Noter une séance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f1612;--ink:#f3f7f4;--muted:#8a978f;--faint:#5a665f;--lime:#b6ff3c;--teal:#34e0b0;--amber:#ffc24b;--red:#ff7a5c;--card:rgba(255,255,255,.04);--card-bd:rgba(255,255,255,.09);}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;}
  body::before{content:"";position:fixed;inset:0;z-index:-2;background:radial-gradient(1100px 600px at 75% -8%,rgba(182,255,60,.10),transparent 55%),radial-gradient(800px 700px at -15% 25%,rgba(52,224,176,.08),transparent 50%);}
  .wrap{max-width:620px;margin:0 auto;padding:0 20px 80px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:26px 0;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .logo{width:40px;height:40px;border-radius:12px;background:#161a20;border:1px solid #2a3038;display:grid;place-items:center;box-shadow:0 6px 22px rgba(182,255,60,.28);}
  .brand .logo svg{width:21px;height:21px;}
  .brand b{font-family:'Sora';font-weight:800;font-size:20px;}
  .back{color:var(--muted);text-decoration:none;font-size:13px;border:1px solid var(--card-bd);padding:8px 15px;border-radius:30px;transition:.18s;}
  .back:hover{color:var(--lime);border-color:var(--lime);}
  .pick{margin:10px 0 24px;}
  label{display:block;font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;font-weight:600;}
  select,input,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--card-bd);border-radius:13px;padding:13px 15px;color:var(--ink);font-family:inherit;font-size:15px;}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--lime);}
  .panel{background:var(--card);border:1px solid var(--card-bd);border-radius:24px;padding:24px;margin-bottom:18px;backdrop-filter:blur(8px);}
  .panel h3{font-family:'Sora';font-weight:700;font-size:17px;margin-bottom:4px;}
  .panel .hint{color:var(--muted);font-size:12.5px;margin-bottom:18px;}
  .crit{margin-bottom:22px;}
  .crit .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .crit .head .nm input{width:auto;background:none;border:none;padding:2px 4px;font-weight:600;font-size:14.5px;border-bottom:1px dashed transparent;color:var(--ink);}
  .crit .head .nm input:focus{border-bottom-color:var(--lime);}
  .crit .head .score{font-family:'Sora';font-weight:800;font-size:21px;color:var(--lime);min-width:54px;text-align:right;}
  .zone-pick{margin:14px 0 4px;}
  .zone-hint{display:block;font-size:12px;color:var(--muted);margin-bottom:10px;}
  .zone-hint b{color:var(--lime);font-weight:700;}
  .mini-wrap{display:flex;gap:24px;justify-content:center;}
  .mini-col{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .mini{width:70px;height:auto;}
  .mini-cap{font-size:10px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;}
  .mz{fill:#28342c;stroke:#3a4a40;stroke-width:1.5;cursor:pointer;transition:fill .15s;}
  .mz:hover{fill:#46584c;}
  .mz.sel{fill:var(--lime);stroke:var(--lime);}
  .crit input[type=range]{-webkit-appearance:none;width:100%;height:8px;border-radius:8px;background:rgba(255,255,255,.08);outline:none;cursor:pointer;}
  .crit input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--lime);cursor:pointer;border:4px solid #0f1612;box-shadow:0 0 0 1px var(--lime),0 0 12px rgba(182,255,60,.5);}
  .crit input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--lime);cursor:pointer;border:4px solid #0f1612;}
  .del-crit{background:none;border:none;color:var(--faint);cursor:pointer;font-size:12px;padding:0 4px;}
  .del-crit:hover{color:var(--red);}
  .add-crit{width:100%;background:rgba(255,255,255,.03);border:1px dashed var(--card-bd);color:var(--muted);border-radius:13px;padding:13px;font-family:inherit;font-size:14px;cursor:pointer;transition:.18s;}
  .add-crit:hover{border-color:var(--lime);color:var(--lime);}
  textarea{min-height:80px;resize:vertical;}
  .save{width:100%;background:var(--lime);color:#0f1612;border:none;border-radius:30px;padding:17px;font-family:'Sora';font-weight:700;font-size:16px;cursor:pointer;transition:.18s;}
  .save:hover{filter:brightness(1.07);transform:translateY(-1px);}
  .save:disabled{opacity:.5;}
  .msg{margin-top:14px;padding:12px 15px;border-radius:13px;font-size:13.5px;display:none;}
  .msg.show{display:block;}
  .msg.err{background:rgba(255,122,92,.12);color:var(--red);}
  .msg.ok{background:rgba(52,224,176,.1);color:var(--teal);}
  .gate{text-align:center;padding:80px 20px;color:var(--muted);}
  .gate a{color:var(--lime);}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19 L12 5 M6 11 L12 5 L18 11"/></svg></div><b>Silhouet</b></div>
    <a class="back" href="app.html">← Mes clients</a>
  </div>
  <div id="gate" class="gate">Vérification…</div>
  <div id="app" style="display:none">
    <div class="pick"><label>Client</label><select id="clientSelect" onchange="onClientChange()"><option>Chargement…</option></select></div>
    <div class="panel">
      <h3>Notes de la séance</h3>
      <p class="hint">Glisse chaque critère selon la forme du jour. Tu peux renommer un critère ou en ajouter.</p>
      <div id="criteria"></div>
      <button class="add-crit" onclick="addCriterion()">+ Ajouter un critère</button>
    </div>
    <div class="panel">
      <h3>Mot pour le client</h3>
      <p class="hint">Optionnel — un encouragement qui s'affiche sur sa fiche.</p>
      <textarea id="note" placeholder="Gros mois, tes jambes ont vraiment progressé…"></textarea>
    </div>
    <button class="save" id="saveBtn" onclick="saveSession()">Enregistrer la séance</button>
    <div class="msg" id="msg"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL="https://gepplcndfbjohplfdxki.supabase.co";
  const SUPABASE_KEY="sb_publishable_FVByYoFLUxfiHTZpAtf5dQ_2k56Hf-7";
  const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  // Zones du corps disponibles. value = clé technique, label = ce que voit le coach.
  // Mini-silhouettes cliquables (face + dos). Le coach clique la zone à lier au critère.
  function miniBody(zone){
    // face : zones energie(tête), bras, tronc, jambes, mollets
    // dos  : bras, dos, fessiers, ischios, mollets
    return `
    <div class="mini-wrap">
      <div class="mini-col">
        <svg class="mini" viewBox="0 0 100 250">
          <circle class="mz" data-z="energie" cx="50" cy="20" r="13"/>
          <rect class="mz" data-z="bras" x="14" y="44" width="15" height="70" rx="7"/>
          <rect class="mz" data-z="bras" x="71" y="44" width="15" height="70" rx="7"/>
          <path class="mz" data-z="tronc" d="M32 42 L68 42 Q72 44 71 52 L69 116 Q50 124 31 116 L29 52 Q28 44 32 42 Z"/>
          <path class="mz" data-z="jambes" d="M33 120 Q41 124 49 122 L48 180 L36 180 Z"/>
          <path class="mz" data-z="jambes" d="M67 120 Q59 124 51 122 L52 180 L64 180 Z"/>
          <rect class="mz" data-z="mollets" x="36" y="184" width="12" height="56" rx="6"/>
          <rect class="mz" data-z="mollets" x="52" y="184" width="12" height="56" rx="6"/>
        </svg>
        <span class="mini-cap">Face</span>
      </div>
      <div class="mini-col">
        <svg class="mini" viewBox="0 0 100 250">
          <circle class="mz" data-z="energie" cx="50" cy="20" r="13"/>
          <rect class="mz" data-z="bras" x="14" y="44" width="15" height="70" rx="7"/>
          <rect class="mz" data-z="bras" x="71" y="44" width="15" height="70" rx="7"/>
          <path class="mz" data-z="dos" d="M32 42 L68 42 Q72 44 71 52 L69 116 Q50 124 31 116 L29 52 Q28 44 32 42 Z"/>
          <path class="mz" data-z="fessiers" d="M31 118 Q50 126 69 118 L67 144 Q50 150 33 144 Z"/>
          <path class="mz" data-z="ischios" d="M34 146 Q42 150 49 148 L48 184 L37 184 Z"/>
          <path class="mz" data-z="ischios" d="M66 146 Q58 150 51 148 L52 184 L63 184 Z"/>
          <rect class="mz" data-z="mollets" x="37" y="188" width="11" height="52" rx="6"/>
          <rect class="mz" data-z="mollets" x="52" y="188" width="11" height="52" rx="6"/>
        </svg>
        <span class="mini-cap">Dos</span>
      </div>
    </div>`;
  }
  // Critères par défaut : [nom, note, zone]
  const DEFAULT_CRIT=[["Quadriceps",7,"jambes"],["Pectoraux / abdos",6,"tronc"],["Dorsaux",6,"dos"],["Biceps / triceps",6,"bras"],["Endurance",7,""]];
  function renderCrit(name,val,zone){
    zone=zone||"";
    const div=document.createElement('div');
    div.className='crit';
    div.dataset.zone=zone;
    div.innerHTML=`<div class="head"><span class="nm"><input type="text" value="${name.replace(/"/g,'&quot;')}"></span><span class="score">${val}/10</span></div>
      <input type="range" min="0" max="10" step="1" value="${val}" oninput="this.closest('.crit').querySelector('.score').textContent=this.value+'/10'">
      <div class="zone-pick">
        <span class="zone-hint">Touche la zone du corps (optionnel) · <b class="zone-current">${zone?zoneLabel(zone):'tout le corps'}</b></span>
        ${miniBody(zone)}
      </div>
      <div style="text-align:right;margin-top:6px"><button class="del-crit" onclick="this.closest('.crit').remove()">supprimer</button></div>`;
    document.getElementById('criteria').appendChild(div);
    // surligner la zone déjà choisie + brancher les clics
    const crit=div;
    function paint(){
      const z=crit.dataset.zone;
      crit.querySelectorAll('.mz').forEach(r=>r.classList.toggle('sel',z&&r.dataset.z===z));
      crit.querySelector('.zone-current').textContent=z?zoneLabel(z):'tout le corps';
    }
    crit.querySelectorAll('.mz').forEach(r=>{
      r.addEventListener('click',()=>{
        // re-clic sur la même zone = désélection (revient à tout le corps)
        crit.dataset.zone = (crit.dataset.zone===r.dataset.z)?'':r.dataset.z;
        paint();
      });
    });
    paint();
  }
  const ZONE_LABELS={jambes:'Jambes',tronc:'Tronc / pec / abdos',dos:'Dos',bras:'Bras / épaules',fessiers:'Fessiers',ischios:'Ischios',mollets:'Mollets',energie:'Tête / énergie'};
  function zoneLabel(z){return ZONE_LABELS[z]||z;}
  function addCriterion(){renderCrit("Nouveau critère",5,"");}
  function loadDefaultCriteria(){document.getElementById('criteria').innerHTML='';DEFAULT_CRIT.forEach(([n,v,z])=>renderCrit(n,v,z));}
  function collectCriteria(){const obj={};document.querySelectorAll('#criteria .crit').forEach(c=>{const name=c.querySelector('.nm input').value.trim();const val=parseInt(c.querySelector('input[type=range]').value,10);const zone=c.dataset.zone||'';if(name)obj[name]={note:val,zone:zone};});return obj;}
  async function loadClients(){
    const sel=document.getElementById('clientSelect');
    const {data,error}=await sb.from('clients').select('id,nom').order('nom');
    if(error||!data||!data.length){sel.innerHTML='<option value="">Aucun client — ajoute-en un d\'abord</option>';return;}
    sel.innerHTML=data.map(c=>`<option value="${c.id}">${c.nom}</option>`).join('');
    const preId=new URLSearchParams(location.search).get('id');
    if(preId&&data.some(c=>c.id===preId))sel.value=preId;
    onClientChange();
  }
  async function onClientChange(){
    const clientId=document.getElementById('clientSelect').value;
    if(!clientId){loadDefaultCriteria();return;}
    const {data}=await sb.from('evaluations').select('criteres').eq('client_id',clientId).order('created_at',{ascending:false}).limit(1);
    document.getElementById('criteria').innerHTML='';
    if(data&&data.length&&data[0].criteres&&Object.keys(data[0].criteres).length){
      Object.entries(data[0].criteres).forEach(([n,v])=>{
        if(typeof v==='object'&&v!==null){renderCrit(n,v.note,v.zone||"");}
        else{renderCrit(n,v,"");}
      });
    }
    else{loadDefaultCriteria();}
  }
  async function saveSession(){
    const clientId=document.getElementById('clientSelect').value;
    if(!clientId){showMsg('Sélectionne un client.','err');return;}
    const criteres=collectCriteria();
    if(Object.keys(criteres).length===0){showMsg('Ajoute au moins un critère.','err');return;}
    const note=document.getElementById('note').value.trim();
    const btn=document.getElementById('saveBtn');btn.disabled=true;
    const {error}=await sb.from('evaluations').insert({client_id:clientId,criteres,note_seance:note});
    btn.disabled=false;
    if(error){showMsg(error.message,'err');return;}
    showMsg('Séance enregistrée ! La fiche du client est à jour.','ok');
    document.getElementById('note').value='';
  }
  function showMsg(t,type){const m=document.getElementById('msg');m.textContent=t;m.className='msg show '+type;if(type==='ok')setTimeout(()=>m.className='msg',3500);}
  (async()=>{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){document.getElementById('gate').innerHTML='Tu dois être connecté. <a href="app.html">Se connecter →</a>';return;}
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    loadClients();
  })();
</script>
</body>
</html>
