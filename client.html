<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Silhouet · Noter une séance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e0c;--panel:#111714;--panel-2:#161e1a;--line:rgba(255,255,255,.08);--txt:#eef2ef;--muted:#8a968f;--lime:#c4ff4d;--teal:#3dd7b0;--amber:#ffb24d;--red:#ff6b5e;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--txt);font-family:'Archivo',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(900px 500px at 80% -10%,rgba(196,255,77,.08),transparent 60%);}
  .wrap{max-width:620px;margin:0 auto;padding:0 20px 80px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:24px 0;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo .mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--lime),var(--teal));display:grid;place-items:center;color:#0a0e0c;font-family:'Bricolage Grotesque';font-weight:800;font-size:15px;}
  .logo b{font-family:'Bricolage Grotesque';font-weight:800;font-size:19px;}
  .back{color:var(--muted);text-decoration:none;font-size:13px;border:1px solid var(--line);padding:7px 13px;border-radius:9px;transition:.18s;}
  .back:hover{color:var(--lime);border-color:var(--lime);}

  .pick{margin:10px 0 24px;}
  label{display:block;font-size:12px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;font-weight:600;}
  select,input,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:11px;padding:13px 15px;color:var(--txt);font-family:inherit;font-size:15px;}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--lime);}

  .panel{background:linear-gradient(180deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:20px;padding:24px;margin-bottom:18px;}
  .panel h3{font-family:'Bricolage Grotesque';font-weight:700;font-size:17px;margin-bottom:4px;}
  .panel .hint{color:var(--muted);font-size:12.5px;margin-bottom:18px;}

  .crit{margin-bottom:20px;}
  .crit .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
  .crit .head .nm{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14.5px;}
  .crit .head .nm input{width:auto;background:none;border:none;padding:2px 4px;font-weight:600;font-size:14.5px;border-bottom:1px dashed transparent;}
  .crit .head .nm input:focus{border-bottom-color:var(--lime);}
  .crit .head .score{font-family:'Bricolage Grotesque';font-weight:800;font-size:20px;color:var(--lime);min-width:54px;text-align:right;}
  .crit input[type=range]{-webkit-appearance:none;width:100%;height:7px;border-radius:7px;background:rgba(255,255,255,.08);outline:none;cursor:pointer;}
  .crit input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--lime);cursor:pointer;border:3px solid #0a0e0c;box-shadow:0 0 0 1px var(--lime);}
  .crit input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--lime);cursor:pointer;border:3px solid #0a0e0c;}
  .del-crit{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px;}
  .del-crit:hover{color:var(--red);}
  .add-crit{width:100%;background:rgba(255,255,255,.03);border:1px dashed var(--line);color:var(--muted);border-radius:11px;padding:12px;font-family:inherit;font-size:14px;cursor:pointer;transition:.18s;}
  .add-crit:hover{border-color:var(--lime);color:var(--lime);}

  textarea{min-height:80px;resize:vertical;}
  .save{width:100%;background:var(--lime);color:#0a0e0c;border:none;border-radius:13px;padding:16px;font-family:'Bricolage Grotesque';font-weight:700;font-size:16px;cursor:pointer;transition:.18s;}
  .save:hover{filter:brightness(1.07);transform:translateY(-1px);}
  .save:disabled{opacity:.5;}
  .msg{margin-top:14px;padding:12px 15px;border-radius:11px;font-size:13.5px;display:none;}
  .msg.show{display:block;}
  .msg.err{background:rgba(255,107,94,.12);color:var(--red);}
  .msg.ok{background:rgba(61,215,176,.1);color:var(--teal);}
  .gate{text-align:center;padding:60px 20px;color:var(--muted);}
  .gate a{color:var(--lime);}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo"><div class="mark">S</div><b>Silhouet</b></div>
    <a class="back" href="coach.html">← Mes clients</a>
  </div>

  <div id="gate" class="gate">Vérification…</div>

  <div id="app" style="display:none">
    <div class="pick">
      <label>Client</label>
      <select id="clientSelect" onchange="onClientChange()"><option>Chargement…</option></select>
    </div>

    <div class="panel">
      <h3>Notes de la séance</h3>
      <p class="hint">Glisse chaque critère selon la forme du jour. Tu peux renommer un critère ou en ajouter.</p>
      <div id="criteria"></div>
      <button class="add-crit" onclick="addCriterion()">+ Ajouter un critère</button>
    </div>

    <div class="panel">
      <h3>Mot pour le client</h3>
      <p class="hint">Optionnel — un encouragement qui s'affiche sur sa fiche.</p>
      <textarea id="note" placeholder="Gros mois, tes jambes ont vraiment progressé…"></textarea>
    </div>

    <button class="save" id="saveBtn" onclick="saveSession()">Enregistrer la séance</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL="https://gepplcndfbjohplfdxki.supabase.co";
  const SUPABASE_KEY="sb_publishable_FVByYoFLUxfiHTZpAtf5dQ_2k56Hf-7";
  const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

  const DEFAULT_CRIT=[["Jambes · force",7],["Tronc · gainage",6],["Bras · tonus",6],["Cardio · endurance",7],["Énergie · récup",7]];

  function renderCrit(name,val){
    const div=document.createElement('div');
    div.className='crit';
    div.innerHTML=`<div class="head">
        <span class="nm"><input type="text" value="${name.replace(/"/g,'&quot;')}"></span>
        <span class="score">${val}/10</span>
      </div>
      <input type="range" min="0" max="10" step="1" value="${val}"
        oninput="this.closest('.crit').querySelector('.score').textContent=this.value+'/10'">
      <div style="text-align:right;margin-top:6px"><button class="del-crit" onclick="this.closest('.crit').remove()">supprimer</button></div>`;
    document.getElementById('criteria').appendChild(div);
  }
  function addCriterion(){ renderCrit("Nouveau critère",5); }

  function loadDefaultCriteria(){
    document.getElementById('criteria').innerHTML='';
    DEFAULT_CRIT.forEach(([n,v])=>renderCrit(n,v));
  }

  function collectCriteria(){
    const obj={};
    document.querySelectorAll('#criteria .crit').forEach(c=>{
      const name=c.querySelector('.nm input').value.trim();
      const val=parseInt(c.querySelector('input[type=range]').value,10);
      if(name) obj[name]=val;
    });
    return obj;
  }

  async function loadClients(){
    const sel=document.getElementById('clientSelect');
    const {data,error}=await sb.from('clients').select('id,nom').order('nom');
    if(error||!data||!data.length){
      sel.innerHTML='<option value="">Aucun client — ajoute-en un d\'abord</option>';
      return;
    }
    sel.innerHTML=data.map(c=>`<option value="${c.id}">${c.nom}</option>`).join('');
    onClientChange();
  }

  async function onClientChange(){
    // précharge les derniers critères du client s'ils existent, sinon défaut
    const clientId=document.getElementById('clientSelect').value;
    if(!clientId){ loadDefaultCriteria(); return; }
    const {data}=await sb.from('evaluations').select('criteres').eq('client_id',clientId).order('created_at',{ascending:false}).limit(1);
    document.getElementById('criteria').innerHTML='';
    if(data&&data.length&&data[0].criteres&&Object.keys(data[0].criteres).length){
      Object.entries(data[0].criteres).forEach(([n,v])=>renderCrit(n,v));
    }else{
      loadDefaultCriteria();
    }
  }

  async function saveSession(){
    const clientId=document.getElementById('clientSelect').value;
    if(!clientId){ showMsg('Sélectionne un client.','err'); return; }
    const criteres=collectCriteria();
    if(Object.keys(criteres).length===0){ showMsg('Ajoute au moins un critère.','err'); return; }
    const note=document.getElementById('note').value.trim();
    const btn=document.getElementById('saveBtn'); btn.disabled=true;
    const {error}=await sb.from('evaluations').insert({client_id:clientId,criteres,note_seance:note});
    btn.disabled=false;
    if(error){ showMsg(error.message,'err'); return; }
    showMsg('Séance enregistrée ! La fiche du client est à jour.','ok');
    document.getElementById('note').value='';
  }

  function showMsg(t,type){const m=document.getElementById('msg');m.textContent=t;m.className='msg show '+type;if(type==='ok')setTimeout(()=>m.className='msg',3500);}

  (async()=>{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){
      document.getElementById('gate').innerHTML='Tu dois être connecté. <a href="coach.html">Se connecter →</a>';
      return;
    }
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    loadClients();
  })();
</script>
</body>
</html>
